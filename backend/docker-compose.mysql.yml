services:
  mysql:
    image: mysql:8.4
    container_name: hours24-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: hours24
      MYSQL_USER: hours24
      MYSQL_PASSWORD: hours24_password
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "3306:3306"
    volumes:
      - hours24_mysql_data:/var/lib/mysql

volumes:
  hours24_mysql_data:
